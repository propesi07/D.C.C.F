<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D.C.C.F - Clube de Detetives</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #121826; color: #e2e8f0; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 2px solid #b7791f; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .text-logo { font-family: 'Georgia', serif; font-size: 3.5em; font-weight: bold; color: #ecc94b; text-shadow: 3px 3px 6px rgba(0,0,0,0.8); margin-bottom: 10px; letter-spacing: 4px; }
        h1, h2, h3 { color: #ecc94b; margin: 10px 0; }
        .motto { font-style: italic; color: #94a3b8; margin-bottom: 20px; }
        input, textarea, button { width: 90%; margin: 8px 0; padding: 10px; border-radius: 5px; border: 1px solid #475569; background: #0f172a; color: white; font-family: inherit; }
        button { background: #b7791f; color: #0f172a; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; }
        button:hover { background: #d69e2e; }
        .hidden { display: none; }
        .post { background: #334155; padding: 15px; margin: 10px 0; border-left: 5px solid #ecc94b; text-align: left; position: relative; border-radius: 4px; }
        .delete-btn { position: absolute; right: 10px; top: 10px; background: #ef4444; color: white; border: none; padding: 5px 10px; cursor: pointer; width: auto; font-size: 12px; }
        .agent-badge { background: #b7791f; color: #0f172a; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN DO AGENTE -->
    <div id="login-screen" class="container">
        <div class="card">
            <div class="text-logo">D.C.C.F.</div>
            <h2>Identificação do Agente</h2>
            <input type="text" id="agent-name-input" placeholder="Seu Nome / Codinome de Agente">
            <input type="password" id="password-input" placeholder="Senha secreta do clube (dccf)...">
            <button onclick="login()">Entrar no QG</button>
        </div>
    </div>

    <!-- PAINEL PRINCIPAL -->
    <div id="main-content" class="container hidden">
        <div class="text-logo">D.C.C.F.</div>
        <p><strong>D</strong>etetives | <strong>C</strong>asa | <strong>C</strong>abo | <strong>F</strong>rio</p>
        <p class="motto">"Observamos. Pensamos. Descobrimos. Juntos, sempre!"</p>
        <p style="color: #ecc94b;">Conectado como: <span id="current-agent-display" class="agent-badge"></span></p>

        <!-- Formulário -->
        <div class="card">
            <h3>Nova Operação / Relatório</h3>
            <input type="text" id="title-input" placeholder="Nome da Operação">
            <input type="text" id="agents-input" placeholder="Agentes envolvidos">
            <input type="date" id="date-input">
            <textarea id="content-input" placeholder="Escreva a mensagem ou relatório do caso..."></textarea>
            <button onclick="addPost()">Enviar para o QG</button>
        </div>

        <!-- Feed -->
        <h2>Arquivos Confidenciais</h2>
        <div id="posts-container">Carregando mensagens do QG...</div>
    </div>

    <script>
        const DB_URL = "https://kvdb.io/DCCF_Clube_Detetives_2026_QG/posts";
        let currentAgent = "";

        function login() {
            const name = document.getElementById('agent-name-input').value.trim();
            const pass = document.getElementById('password-input').value.trim();

            if (!name) return alert('Por favor, digite seu nome de agente!');
            if (pass !== 'dccf') return alert('Senha incorreta! Acesso negado.');

            currentAgent = name;
            document.getElementById('current-agent-display').innerText = currentAgent;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');

            loadPosts();
            setInterval(loadPosts, 3000);
        }

        async function loadPosts() {
            try {
                const response = await fetch(DB_URL);
                const posts = response.ok ? await response.json() : [];
                
                const container = document.getElementById('posts-container');
                container.innerHTML = '';

                if (posts.length === 0) {
                    container.innerHTML = '<p style="color: #94a3b8;">Nenhuma operação registrada ainda.</p>';
                    return;
                }

                posts.reverse().forEach((post, index) => {
                    const originalIndex = posts.length - 1 - index;
                    const postDiv = document.createElement('div');
                    postDiv.className = 'post';
                    postDiv.innerHTML = `
                        <strong style="color: #ecc94b;">${post.title}</strong> - <small>${post.date || 'Sem data'}</small><br>
                        <small style="color: #94a3b8;">Postado por: <span class="agent-badge">${post.agent}</span> | Agentes: ${post.agents || 'Não informado'}</small><br><br>
                        <div>${post.content}</div>
                        <button class="delete-btn" onclick="deletePost(${originalIndex})">Apagar</button>
                    `;
                    container.appendChild(postDiv);
                });
            } catch (e) {
                console.log("Aguardando novas mensagens...");
            }
        }

        async function addPost() {
            const title = document.getElementById('title-input').value;
            const agents = document.getElementById('agents-input').value;
            const date = document.getElementById('date-input').value;
            const content = document.getElementById('content-input').value;

            if (!title || !content) return alert('Preencha a operação e o relatório!');

            try {
                const response = await fetch(DB_URL);
                const posts = response.ok ? await response.json() : [];

                posts.push({
                    title: title,
                    agent: currentAgent,
                    agents: agents,
                    date: date,
                    content: content
                });

                await fetch(DB_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(posts)
                });

                document.getElementById('title-input').value = '';
                document.getElementById('agents-input').value = '';
                document.getElementById('date-input').value = '';
                document.getElementById('content-input').value = '';
                loadPosts();
            } catch (e) {
                alert("Erro ao enviar mensagem. Tente novamente!");
            }
        }

        async function deletePost(index) {
            if (confirm("Tem certeza que deseja apagar este relatório?")) {
                try {
                    const response = await fetch(DB_URL);
                    let posts = response.ok ? await response.json() : [];
                    posts.splice(index, 1);

                    await fetch(DB_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(posts)
                    });

                    loadPosts();
                } catch (e) {
                    alert("Erro ao apagar postagem.");
                }
            }
        }
    </script>
</body>
</html>
